<?xml version="1.0" encoding="UTF-8"?>
<configuration xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xsi:noNamespaceSchemaLocation="http://sumo.dlr.de/xsd/sumoConfiguration.xsd">
    <input>
        <net-file value="lust.net.xml"/>
        <route-files value="lust_peak.rou.xml"/>
    </input>
    <output>
        <tripinfo-output value="/home/veins/my_workspace/test_workspace/simulte/simulations/cars/results/tripinfo_Penetration15.xml"/>
    </output>
    <time>
        <begin value="0"/>
        <step-length value="1.0"/>
    </time>
    <processing>
        <extrapolate-departpos value="true"/>
        <ignore-junction-blocker value="15"/>
        <collision.mingap-factor value="0.1"/>
        <collision.action value="none"/>
        <time-to-teleport value="120"/>
        <random-depart-offset value="0.001"/>
        <ignore-route-errors value="true"/>
    </processing>
    <routing>
        <weights.priority-factor value="2"/>
        <device.rerouting.probability value="0"/>
    </routing>
    <report>
        <verbose value="true"/>
        <duration-log.statistics value="true"/>
        <no-step-log value="true"/>
    </report>
    <random_number>
        <random value="false"/>
        <seed value="0"/>
    </random_number>
</configuration>
