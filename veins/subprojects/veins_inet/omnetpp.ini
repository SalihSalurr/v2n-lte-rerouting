[General]
network = Scenario
sim-time-limit = 60s
debug-on-errors = true
cmdenv-express-mode = true
image-path = ../../../../images

*.playgroundSizeX = 12000m
*.playgroundSizeY = 12000m
*.playgroundSizeZ = 50m


# Araçtaki arayüz sayısını 2 yapıyoruz
*.node[*].numWlanInterfaces = 2

# UDPBasicApp

*.node[*].numApps = 1
*.node[*].app[0].typename = "org.car2x.veins.subprojects.veins_inet.VeinsInetSampleApplication"
*.node[*].app[0].interface = "wlan0"

# Ieee80211Interface "P"
# --- wlan[0] (802.11p - DSRC) ---
*.node[*].wlan[0].opMode = "p"
*.node[*].wlan[0].radio.typename = "Ieee80211DimensionalRadio"
*.node[*].wlan[0].radio.bandName = "5.9 GHz"
*.node[*].wlan[0].radio.channelNumber = 3
*.node[*].wlan[0].radio.transmitter.power = 20mW
*.node[*].wlan[0].radio.bandwidth = 10 MHz

# --- wlan[1] (802.11g - WiFi) ---
# wlan[1] (Standart WiFi - 2.4 GHz) Ayarları:
*.node[*].wlan[1].typename = "Ieee80211Interface"
*.node[*].wlan[1].opMode = "g(erp)" 
*.node[*].wlan[1].radio.typename = "Ieee80211DimensionalRadio"
*.node[*].wlan[1].radio.bandName = "2.4 GHz"
*.node[*].wlan[1].radio.channelNumber = 1
*.node[*].wlan[1].radio.transmitter.power = 50mW   # WiFi genelde biraz daha güçlüdür
*.node[*].wlan[1].radio.bandwidth = 20 MHz


*.node[*].wlan[*].radio.antenna.mobility.typename = "AttachedMobility"
*.node[*].wlan[*].radio.antenna.mobility.mobilityModule = "^.^.^.^.mobility"
*.node[*].wlan[*].radio.antenna.mobility.offsetX = -2.5m
*.node[*].wlan[*].radio.antenna.mobility.offsetZ = 1.5m
# Eğer illa sınır belirleyeceksen playground boyutlarını kullanmalısın:
*.node[*].wlan[*].radio.antenna.mobility.constraintAreaMaxX = 12000m
*.node[*].wlan[*].radio.antenna.mobility.constraintAreaMaxY = 12000m
*.node[*].wlan[*].radio.antenna.mobility.constraintAreaMaxZ = 50m

*.node[*].wlan[*].radio.antenna.mobility.constraintAreaMinX = 0m
*.node[*].wlan[*].radio.antenna.mobility.constraintAreaMinY = 0m
*.node[*].wlan[*].radio.antenna.mobility.constraintAreaMinZ = 0m

# --- IPv4 Configurator (DÜZELTME) ---
*.node[*].ipv4.configurator.typename = "HostAutoConfigurator"
# Her iki arayüzün de IP almasını sağlıyoruz:
*.node[*].ipv4.configurator.interfaces = "wlan0 wlan1" 
*.node[*].ipv4.configurator.mcastGroups = "224.0.0.1"


######################################################################
# --- RSU (Roadside Unit) Yapılandırması ---						#
#####################################################################
# RSU'yu hareket etmeyen bir araç gibi yapılandırıyoruz
*.rsu[*].mobility.typename = "StationaryMobility"
*.rsu[*].mobility.initFromDisplayString = false

# RSU için uygulama istemiyoruz (şimdilik hata vermesin diye)
*.rsu[*].numApps = 0
*.rsu[*].numWlanInterfaces = 2
# --- wlan[0] (802.11p - DSRC) ---
# WiFi Ayarları (Araçlarla aynı frekans - 5.9 GHz)
*.rsu[*].wlan[0].opMode = "p"
*.rsu[*].wlan[0].radio.typename = "Ieee80211DimensionalRadio"
*.rsu[*].wlan[0].radio.bandName = "5.9 GHz"
*.rsu[*].wlan[0].radio.channelNumber = 3
*.rsu[*].wlan[0].radio.transmitter.power = 100mW
*.rsu[*].wlan[0].radio.bandwidth = 10 MHz

# --- wlan[1] (802.11g - WiFi) ---
# wlan[1] (Standart WiFi - 2.4 GHz) Ayarları:
*.rsu[*].wlan[1].typename = "Ieee80211Interface"
*.rsu[*].wlan[1].opMode = "g(erp)" 
*.rsu[*].wlan[1].radio.typename = "Ieee80211DimensionalRadio"
*.rsu[*].wlan[1].radio.bandName = "2.4 GHz"
*.rsu[*].wlan[1].radio.channelNumber = 1
*.rsu[*].wlan[1].radio.transmitter.power = 50mW   # WiFi genelde biraz daha güçlüdür
*.rsu[*].wlan[1].radio.bandwidth = 20 MHz

*.rsu[*].wlan[*].radio.antenna.mobility.typename = "AttachedMobility"
*.rsu[*].wlan[*].radio.antenna.mobility.mobilityModule = "^.^.^.^.mobility"
*.rsu[*].wlan[*].radio.antenna.mobility.offsetX = -2.5m
*.rsu[*].wlan[*].radio.antenna.mobility.offsetZ = 1.5m

*.rsu[*].wlan[*].radio.antenna.mobility.constraintAreaMaxX = 12000m
*.rsu[*].wlan[*].radio.antenna.mobility.constraintAreaMaxY = 12000m
*.rsu[*].wlan[*].radio.antenna.mobility.constraintAreaMaxZ = 50m

*.rsu[*].wlan[*].radio.antenna.mobility.constraintAreaMinX = 0m
*.rsu[*].wlan[*].radio.antenna.mobility.constraintAreaMinY = 0m
*.rsu[*].wlan[*].radio.antenna.mobility.constraintAreaMinZ = 0m
# IP Yapılandırması
*.rsu[*].ipv4.configurator.networkConfiguratorModule = "configurator"


# --- 6 Adet RSU'nun Konumlandırılması ---

# RSU 0
*.rsu[0].mobility.initialX = 808m
*.rsu[0].mobility.initialY = 1268m
*.rsu[0].mobility.initialZ = 10m

# RSU 1
*.rsu[1].mobility.initialX = 900m
*.rsu[1].mobility.initialY = 3950m
*.rsu[1].mobility.initialZ = 10m

# RSU 2
*.rsu[2].mobility.initialX = 1120m
*.rsu[2].mobility.initialY = 1959m
*.rsu[2].mobility.initialZ = 10m

# RSU 3
*.rsu[3].mobility.initialX = 2236m
*.rsu[3].mobility.initialY = 1549m
*.rsu[3].mobility.initialZ = 10m

# RSU 4
*.rsu[4].mobility.initialX = 2308m
*.rsu[4].mobility.initialY = 3680m
*.rsu[4].mobility.initialZ = 10m

# RSU 5
*.rsu[5].mobility.initialX = 2872m
*.rsu[5].mobility.initialY = 2500m
*.rsu[5].mobility.initialZ = 10m

# Tüm RSU'lar için ortak ayarlar (Hepsine tek tek yazmana gerek yok)





######################################################################ss



# VeinsInetMobility
*.node[*].mobility.typename = "VeinsInetMobility"

# VeinsInetManager
*.manager.updateInterval = 0.1s
*.manager.host = "localhost"
*.manager.port = 9999
*.manager.autoShutdown = true
*.manager.launchConfig = xmldoc("istanbul-v1.launchd.xml")
*.manager.moduleType = "org.car2x.veins.subprojects.veins_inet.VeinsInetCar"

# PhysicalEnvironment
*.physicalEnvironment.config = xmldoc("obstacles.xml")
*.radioMedium.obstacleLoss.typename = "IdealObstacleLoss"


# Misc
**.vector-recording = true

[Config plain]

[Config canvas]
extends = plain
description = "Enable enhanced 2D visualization"

# IntegratedCanvasVisualizer (2D)
*.visualizer.*.obstacleLossVisualizer.displayIntersections = true
*.visualizer.*.obstacleLossVisualizer.displayFaceNormalVectors = true
*.visualizer.*.obstacleLossVisualizer.intersectionLineColor = "yellow"
*.visualizer.*.mediumVisualizer.signalPropagationAnimationSpeed = 500/3e8
*.visualizer.*.mediumVisualizer.signalTransmissionAnimationSpeed = 50000/3e8
*.visualizer.*.mediumVisualizer.displaySignals = true
*.visualizer.canvasVisualizer.mediumVisualizer.displaySignalDepartures = false
*.visualizer.canvasVisualizer.mediumVisualizer.displaySignalArrivals = false
*.visualizer.*.physicalLinkVisualizer.displayLinks = true
#*.visualizer.*.mobilityVisualizer.displayPositions = true
#*.visualizer.*.mobilityVisualizer.displayOrientations = true
#*.visualizer.*.mobilityVisualizer.displayVelocities = true
#*.visualizer.*.mobilityVisualizer.displayMovementTrails = true
#*.visualizer.*.mobilityVisualizer.moduleFilter = "**.antenna.mobility"

*.visualizer.osgVisualizer.typename = ""

[Config osg]
extends = canvas
description = "Enable enhanced 2D and 3D visualization using OSG"

*.useOsg = true

# IntegratedOsgVisualizer (3D)
*.visualizer.osgVisualizer.typename = IntegratedOsgVisualizer
*.node[*].osgModel = "veins_inet/node/car.obj.-5e-1,0e-1,5e-1.trans.450e-2,180e-2,150e-2.scale" # offset .5 back and .5 up (position is front bumper at road level), make 450cm long, 180m wide, 150m high

